# GoReleaser config for type.sh
# Docs: https://goreleaser.com
#
# Local checks (no publishing):
#   goreleaser check
#   goreleaser build --snapshot --clean --single-target
#   goreleaser release --snapshot --clean
#
# Real release is driven by .github/workflows/release.yml on a pushed tag.
version: 2

project_name: typesh

before:
  hooks:
    - go mod tidy

builds:
  - id: typesh
    main: .
    binary: typesh
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: typesh
    formats: [tar.gz]
    # Windows users expect .zip
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew personal tap: publishes Casks/typesh.rb to Venki1402/homebrew-tap,
# enabling `brew install Venki1402/tap/typesh`.
homebrew_casks:
  - name: typesh
    binaries: [typesh]
    repository:
      owner: Venki1402
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/Venki1402/type.sh
    description: A cli app for testing typing speed written in go.
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    # Binaries aren't signed/notarized; strip the quarantine flag so macOS
    # Gatekeeper doesn't block the freshly-installed binary.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/typesh"]
          end

release:
  github:
    owner: Venki1402
    name: type.sh
